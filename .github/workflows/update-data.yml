name: Atualizar dados do observatório

on:
  schedule:
    # Diário às 06:00 UTC (03:00 BRT)
    - cron: "0 6 * * *"
  workflow_dispatch: # permite rodar manualmente

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: "[1/6] Rebuild autoria (fetch Câmara API)"
        run: python -u scripts/rebuild_autoria.py
        timeout-minutes: 30

      - name: "[2/6] Enrich autoria (sexo, gender_stats)"
        run: python -u scripts/enrich_autoria.py

      - name: "[3/6] Classify stance (regex)"
        run: python -u scripts/classify_stance.py

      - name: "[4/6] Rebuild articuladores (top 3 por UF)"
        run: python -u scripts/rebuild_articuladores.py

      - name: "[5/6] Rebuild legislativo (tramitação)"
        run: python -u scripts/rebuild_legislativo.py
        timeout-minutes: 20

      - name: "[6/6] Enrich votacoes (autor + relator)"
        run: python -u scripts/enrich_votacoes.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git commit -m "chore: atualização automática de dados $(date -u +%Y-%m-%d)"
          git push

  # Classificação LLM — roda só às segundas (custo ~$0.85/run)
  classify-llm:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: update
    if: github.event.schedule == '0 6 * * 1' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # pega commits do job anterior

      - name: Pull latest (caso update tenha commitado)
        run: git pull origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: "Classify stance via LLM (Haiku 4.5)"
        run: python -u scripts/classify_stance_llm.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: "Re-enrich after LLM"
        run: |
          python -u scripts/enrich_autoria.py
          python -u scripts/rebuild_articuladores.py
          python -u scripts/rebuild_legislativo.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git commit -m "chore: reclassificação LLM semanal $(date -u +%Y-%m-%d)"
          git push
